
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.search-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.search-bar input{flex:1;padding:8px 12px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--color-border-primary)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pill{padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all .15s}
.pill.active,.pill:hover{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.cu-card{border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:12px;overflow:hidden}
.cu-header{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;background:var(--color-background-secondary);user-select:none}
.cu-header:hover{background:var(--color-background-tertiary)}
.cu-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:12px;flex-shrink:0;margin-top:2px}
.badge-esencial{background:#E6F1FB;color:#0C447C}
.badge-deseable{background:#EAF3DE;color:#27500A}
@media(prefers-color-scheme:dark){
  .badge-esencial{background:#0C447C;color:#B5D4F4}
  .badge-deseable{background:#27500A;color:#C0DD97}
}
.cu-title{flex:1}
.cu-rf{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:2px}
.cu-name{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.cu-actor{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.chevron{font-size:16px;color:var(--color-text-tertiary);transition:transform .2s;flex-shrink:0;margin-top:2px}
.cu-body{padding:14px;border-top:1px solid var(--color-border-tertiary);display:none;background:var(--color-background-primary)}
.cu-body.open{display:block}
.cu-section{margin-bottom:10px}
.cu-section:last-child{margin-bottom:0}
.cu-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.cu-text{font-size:13px;color:var(--color-text-primary);line-height:1.6}
.cu-list{font-size:13px;color:var(--color-text-primary);line-height:1.6;padding-left:18px}
.cu-list li{margin-bottom:2px}
.tag-row{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--color-background-tertiary);color:var(--color-text-secondary);border:1px solid var(--color-border-tertiary)}
.empty{text-align:center;padding:32px;color:var(--color-text-tertiary);font-size:14px}
.counter{font-size:12px;color:var(--color-text-tertiary);margin-left:auto;white-space:nowrap}
</style>
<div class="wrap">
<div class="search-bar">
  <input id="srch" placeholder="Buscar por RF, nombre o actor..." oninput="render()">
  <span class="counter" id="cnt"></span>
</div>
<div class="filters">
  <span class="pill active" data-f="todos" onclick="setFilter(this)">Todos</span>
  <span class="pill" data-f="Esencial" onclick="setFilter(this)">Esencial</span>
  <span class="pill" data-f="Deseable" onclick="setFilter(this)">Deseable</span>
  <span class="pill" data-f="Jefe de Planta" onclick="setFilter(this)">Jefe de Planta</span>
  <span class="pill" data-f="Operario" onclick="setFilter(this)">Operario</span>
  <span class="pill" data-f="Analista de Calidad" onclick="setFilter(this)">Analista de Calidad</span>
</div>
<div id="list"></div>
</div>
<script>

let currentFilter="todos";

function setFilter(el){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  currentFilter=el.dataset.f;
  render();
}

function toggle(id){
  const b=document.getElementById('b'+id);
  const c=document.getElementById('c'+id);
  if(b.classList.contains('open')){b.classList.remove('open');c.textContent='›';}
  else{b.classList.add('open');c.textContent='‹';}
}

function render(){
  const q=document.getElementById('srch').value.toLowerCase();
  const filtered=data.filter(d=>{
    const matchFilter=currentFilter==='todos'||d.prioridad===currentFilter||d.actores.some(a=>a.includes(currentFilter));
    const matchSearch=!q||d.id.toLowerCase().includes(q)||d.nombre.toLowerCase().includes(q)||d.nombre_cu.toLowerCase().includes(q)||d.actores.join(' ').toLowerCase().includes(q);
    return matchFilter&&matchSearch;
  });
  document.getElementById('cnt').textContent=filtered.length+' de '+data.length;
  const el=document.getElementById('list');
  if(!filtered.length){el.innerHTML='<div class="empty">No se encontraron casos de uso con ese criterio.</div>';return;}
  el.innerHTML=filtered.map(d=>`
<div class="cu-card">
  <div class="cu-header" onclick="toggle('${d.id}')">
    <div class="cu-badge badge-${d.prioridad.toLowerCase()}">${d.id}</div>
    <div class="cu-title">
      <div class="cu-rf">${d.nombre}</div>
      <div class="cu-name">${d.nombre_cu}</div>
      <div class="cu-actor">Actores: ${d.actores.join(', ')}</div>
    </div>
    <span class="cu-badge badge-${d.prioridad.toLowerCase()}">${d.prioridad}</span>
    <span class="chevron" id="c${d.id}">›</span>
  </div>
  <div class="cu-body" id="b${d.id}">
    <div class="cu-section">
      <div class="cu-label">Objetivo</div>
      <div class="cu-text">${d.objetivo}</div>
    </div>
    <div class="cu-section">
      <div class="cu-label">Precondiciones</div>
      <ul class="cu-list">${d.precondiciones.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="cu-section">
      <div class="cu-label">Flujo principal</div>
      <ol class="cu-list">${d.flujo_principal.map(f=>`<li>${f}</li>`).join('')}</ol>
    </div>
    <div class="cu-section">
      <div class="cu-label">Flujos alternativos / excepciones</div>
      <ul class="cu-list">${d.flujos_alt.map(f=>`<li>${f}</li>`).join('')}</ul>
    </div>
    <div class="cu-section">
      <div class="cu-label">Postcondiciones</div>
      <ul class="cu-list">${d.postcondiciones.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="cu-section">
      <div class="cu-label">Excepciones del sistema</div>
      <div class="tag-row">${d.excepciones.map(e=>`<span class="tag">${e}</span>`).join('')}</div>
    </div>
  </div>
</div>`).join('');
}
render();
</script>
